{{define "settings.html"}}
{{template "head" .}}
<div class="space-y-12">
    <div class="border-b border-wl-border pb-6">
        <h1 class="font-serif text-4xl">{{T .Lang "settings.title"}}</h1>
    </div>

    <form method="POST" action="/settings" class="max-w-sm space-y-8">
        <div>
            <label class="text-xs uppercase tracking-widest text-wl-gray block mb-3">{{T .Lang "settings.language"}}</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="lang" value="es" {{if eq .Lang "es"}}checked{{end}}
                        class="accent-black">
                    <span class="text-sm">Español</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="lang" value="en" {{if eq .Lang "en"}}checked{{end}}
                        class="accent-black">
                    <span class="text-sm">English</span>
                </label>
            </div>
        </div>

        <div>
            <label class="text-xs uppercase tracking-widest text-wl-gray block mb-3">{{T .Lang "settings.email"}}</label>
            <input type="email" name="email" value="{{.Email}}" placeholder="{{T .Lang "settings.email_placeholder"}}"
                class="w-full border-b border-wl-border bg-transparent px-0 py-2 text-sm focus:outline-none focus:border-black">
            <p class="text-xs text-wl-gray mt-2">{{T .Lang "settings.email_help"}}</p>
        </div>

        <button type="submit"
            class="px-6 py-3 text-xs uppercase tracking-widest bg-black text-white hover:bg-wl-dark transition-colors">
            {{T .Lang "settings.save"}}
        </button>
    </form>

    {{if .IsAdmin}}
    <div class="border-t border-wl-border pt-8 mt-12">
        <a href="/admin" class="text-xs uppercase tracking-widest text-wl-gray hover:text-black transition-colors">
            {{T .Lang "settings.admin_link"}} →
        </a>
    </div>
    {{end}}

    <div class="border-t border-wl-border pt-8 mt-12">
        <form method="POST" action="/logout">
            <button type="submit"
                class="text-xs uppercase tracking-widest text-wl-gray hover:text-black transition-colors">
                {{T .Lang "settings.logout"}}
            </button>
        </form>
    </div>
</div>
{{template "foot" .}}
{{end}}
