{{define "lists.html"}}
{{template "head" .}}
<div class="space-y-12">
    <div class="border-b border-wl-border pb-6">
        <h1 class="font-serif text-4xl">{{T .Lang "lists.title"}}</h1>
    </div>

    <div class="max-w-md">
        <div class="flex gap-3">
            <input type="text" id="new-list-name" placeholder="{{T .Lang "lists.new"}}"
                class="flex-1 border-b border-wl-border bg-transparent px-0 py-2 text-sm placeholder-wl-gray focus:outline-none focus:border-black">
            <button onclick="createList()"
                class="px-5 py-2 text-xs uppercase tracking-widest bg-black text-white hover:bg-wl-dark transition-colors">
                {{T .Lang "lists.create"}}
            </button>
        </div>
    </div>

    {{if .Lists}}
    <div class="space-y-px border border-wl-border">
        {{range .Lists}}
        <a href="/lists/{{.ID}}" class="flex items-center justify-between p-6 bg-white hover:bg-wl-light transition-colors">
            <div>
                <h3 class="text-sm">{{.Name}}</h3>
                <p class="text-xs text-wl-gray mt-1">{{if not .CreatedAt.IsZero}}{{.CreatedAt.Format "02.01.2006"}}{{end}}</p>
            </div>
            <span class="text-xs text-wl-gray">→</span>
        </a>
        {{end}}
    </div>
    {{else}}
    <p class="text-sm text-wl-gray py-8">{{T .Lang "lists.empty"}}</p>
    {{end}}
</div>

<script>
function createList() {
    const name = document.getElementById('new-list-name').value.trim();
    if (!name) return;
    htmx.ajax('POST', '/api/lists', {
        target: 'body',
        headers: {'Content-Type': 'application/json'},
        values: JSON.stringify({name: name, is_public: false})
    });
}
</script>
{{template "foot" .}}
{{end}}
