{{define "reset_password.html"}}
{{template "head" .}}
<div class="max-w-sm mx-auto py-24">
    <h1 class="font-serif text-4xl text-center mb-12">{{T .Lang "reset.title"}}</h1>

    {{if .Error}}
    <p class="text-sm text-red-600 mb-6 text-center">{{.Error}}</p>
    {{end}}

    {{if .Token}}
    <form method="POST" action="/reset-password" class="space-y-6">
        <input type="hidden" name="token" value="{{.Token}}">
        <div>
            <label class="text-xs uppercase tracking-widest text-wl-gray block mb-2">{{T .Lang "reset.new_password"}}</label>
            <input type="password" name="password" required autofocus
                class="w-full border-b border-wl-border bg-transparent px-0 py-2 text-sm focus:outline-none focus:border-black">
        </div>
        <button type="submit"
            class="w-full py-3 text-xs uppercase tracking-widest bg-black text-white hover:bg-wl-dark transition-colors">
            {{T .Lang "reset.submit"}}
        </button>
    </form>
    {{end}}

    <p class="text-xs text-wl-gray text-center mt-8">
        <a href="/login" class="text-black underline">{{T .Lang "forgot.back_login"}}</a>
    </p>
</div>
{{template "foot" .}}
{{end}}
