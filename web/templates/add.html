{{define "add.html"}}
{{template "head" .}}
<div class="space-y-12">
    <div class="border-b border-wl-border pb-6">
        <h1 class="font-serif text-4xl">{{T .Lang "add.title"}}</h1>
    </div>

    <div class="flex gap-6 mb-8">
        <button id="btn-series" onclick="setType('tv')"
            class="text-xs uppercase tracking-widest pb-1 border-b-2 border-black">{{T .Lang "add.shows"}}</button>
        <button id="btn-movies" onclick="setType('movie')"
            class="text-xs uppercase tracking-widest pb-1 border-b-2 border-transparent text-wl-gray">{{T .Lang "add.movies"}}</button>
    </div>

    <input type="hidden" id="media-type" value="tv">

    <div class="max-w-2xl">
        <input type="text" id="tmdb-search"
            placeholder="{{T .Lang "add.search_tmdb"}}"
            class="w-full border-b border-black bg-transparent px-0 py-4 text-xl font-light placeholder-wl-gray focus:outline-none"
            hx-get="/add/search"
            hx-trigger="input changed delay:400ms"
            hx-target="#tmdb-results"
            hx-include="#media-type"
            hx-vals='js:{"q": document.getElementById("tmdb-search").value, "type": document.getElementById("media-type").value}'
            autofocus>
    </div>

    <div id="tmdb-results"></div>
</div>

<script>
function setType(type) {
    document.getElementById('media-type').value = type;
    const btnSeries = document.getElementById('btn-series');
    const btnMovies = document.getElementById('btn-movies');
    if (type === 'tv') {
        btnSeries.className = 'text-xs uppercase tracking-widest pb-1 border-b-2 border-black';
        btnMovies.className = 'text-xs uppercase tracking-widest pb-1 border-b-2 border-transparent text-wl-gray';
    } else {
        btnMovies.className = 'text-xs uppercase tracking-widest pb-1 border-b-2 border-black';
        btnSeries.className = 'text-xs uppercase tracking-widest pb-1 border-b-2 border-transparent text-wl-gray';
    }
    const input = document.getElementById('tmdb-search');
    if (input.value) htmx.trigger(input, 'input');
}

function addShow(tmdbId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    htmx.ajax('POST', '/api/tmdb/add-show', {
        target: btn.closest('.tmdb-item').querySelector('.add-result'),
        swap: 'innerHTML',
        headers: {'Content-Type': 'application/json'},
        values: JSON.stringify({tmdb_id: tmdbId})
    });
}

function addMovie(tmdbId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    htmx.ajax('POST', '/api/tmdb/add-movie', {
        target: btn.closest('.tmdb-item').querySelector('.add-result'),
        swap: 'innerHTML',
        headers: {'Content-Type': 'application/json'},
        values: JSON.stringify({tmdb_id: tmdbId})
    });
}
</script>
{{template "foot" .}}
{{end}}
