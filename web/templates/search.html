{{define "search.html"}}
{{template "head" .}}
<div class="space-y-12">
    <div class="max-w-2xl mx-auto pt-8">
        <input type="text" name="q" value=""
            placeholder="{{T .Lang "search.placeholder"}}"
            class="w-full border-b border-black bg-transparent px-0 py-4 text-2xl font-light placeholder-wl-gray focus:outline-none"
            hx-get="/search/results"
            hx-trigger="input changed delay:300ms, search"
            hx-target="#search-results"
            hx-indicator="#search-spinner"
            autofocus>
        <span id="search-spinner" class="htmx-indicator text-xs text-wl-gray mt-2 block">{{T .Lang "search.searching"}}</span>
    </div>

    <div id="search-results"></div>
</div>
<script>
function addShow(tmdbId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    const resultEl = btn.closest('.tmdb-item').querySelector('.add-result');
    fetch('/api/tmdb/add-show', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'HX-Request': 'true'},
        body: JSON.stringify({tmdb_id: tmdbId})
    }).then(r => r.text()).then(html => {
        resultEl.innerHTML = html;
        btn.style.display = 'none';
    });
}
function addMovie(tmdbId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    const resultEl = btn.closest('.tmdb-item').querySelector('.add-result');
    fetch('/api/tmdb/add-movie', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'HX-Request': 'true'},
        body: JSON.stringify({tmdb_id: tmdbId})
    }).then(r => r.text()).then(html => {
        resultEl.innerHTML = html;
        btn.style.display = 'none';
    });
}
</script>
{{template "foot" .}}
{{end}}
