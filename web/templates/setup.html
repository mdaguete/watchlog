{{define "setup.html"}}
{{template "head" .}}
<div class="max-w-sm mx-auto py-24">
    <div class="text-center mb-12">
        <h1 class="font-serif text-5xl">WatchLog</h1>
        <p class="mt-4 text-sm text-wl-gray tracking-wide uppercase">Initial Setup</p>
    </div>

    {{if .Error}}
    <p class="text-sm text-red-600 mb-6 text-center">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/setup" class="space-y-6">
        <div>
            <label class="text-xs uppercase tracking-widest text-wl-gray block mb-2">Username</label>
            <input type="text" name="username" required autofocus
                class="w-full border-b border-wl-border bg-transparent px-0 py-2 text-sm focus:outline-none focus:border-black">
        </div>
        <div>
            <label class="text-xs uppercase tracking-widest text-wl-gray block mb-2">Password</label>
            <input type="password" name="password" required
                class="w-full border-b border-wl-border bg-transparent px-0 py-2 text-sm focus:outline-none focus:border-black">
        </div>
        <button type="submit"
            class="w-full py-3 text-xs uppercase tracking-widest bg-black text-white hover:bg-wl-dark transition-colors">
            Create Account & Continue
        </button>
    </form>
</div>
{{template "foot" .}}
{{end}}
