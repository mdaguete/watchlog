name: Sync develop after release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync:
    # Only sync on final releases; prereleases (e.g. -rc.N) must not fast-forward develop.
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit -m "chore: sync develop with main after release ${{ github.event.release.tag_name }}"
          git push origin develop
