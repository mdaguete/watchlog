version: 2

project_name: watchlog

before:
  hooks:
    - go mod download

builds:
  - id: server
    main: ./cmd/server/
    binary: watchlog
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: ['tar.gz']
    files:
      - web/templates/*
      - web/static/*
      - README.md
      - LICENSE
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  # Immutable-release best practice: create the release as a draft so all assets
  # are attached before it is published. The tag only becomes immutable on
  # publish, so a draft can be safely discarded/re-cut without burning the tag.
  # Publish manually from the GitHub UI after reviewing the draft.
  draft: true
  # Automatically mark tags with a prerelease suffix (e.g. -rc.N, -beta) as
  # GitHub prereleases.
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
